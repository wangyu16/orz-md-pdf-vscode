    </mask>
  </defs>

  <path d="M 90,60 L 310,60 L 420,170 L 420,450 C 420,470 404,486 384,486 L 126,486 C 106,486 90,470 90,450 Z" fill="url(#md-grad)" filter="url(#doc-shadow)" />
  
  <rect x="255" y="0" width="257" height="512" fill="url(#pdf-grad)" clip-path="url(#doc-clip)"/>

  <line x1="255" y1="60" x2="255" y2="486" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.3" />
  <line x1="253.5" y1="60" x2="253.5" y2="486" stroke="#000000" stroke-width="1.5" stroke-opacity="0.4" />

  <path d="M 310,60 L 310,150 C 310,161 319,170 330,170 L 420,170 Z" fill="url(#fold-grad)" filter="url(#fold-shadow)" />
  <path d="M 310,60 L 310,150 C 310,161 319,170 330,170 L 420,170 Z" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8" />

  <g transform="translate(132, 140)">
     <rect x="0" y="0" width="80" height="80" rx="16" fill="#FFFFFF" fill-opacity="0.1"/>
     <g transform="translate(10, 20) scale(2)">
         <rect x="-2" y="-1" width="34" height="22" rx="3" fill="#FFFFFF" mask="url(#md-cutout)"/>
     </g>
  </g>

  <g transform="translate(297, 140)">
     <rect x="0" y="0" width="80" height="80" rx="16" fill="#FFFFFF" fill-opacity="0.15"/>
     <text x="40" y="52" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" text-anchor="middle">PDF</text>
     <rect x="25" y="60" width="30" height="4" rx="2" fill="#FFFFFF"/>
  </g>

  <g transform="translate(138, 275) scale(1.3)" filter="url(#seal-shadow)">
    <g filter="url(#rough-edges)">
      <use href="#seal-shape" fill="#96d969" mask="url(#text-cutout-ancient)" />
      <use href="#seal-shape" fill="#6ea84d" opacity="0.28" filter="url(#stone-texture)" mask="url(#text-cutout-ancient)" />
      <use href="#seal-shape" fill="none" stroke="#c8f7a5" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" stroke-opacity="0.42" mask="url(#text-cutout-ancient)" />
      <use href="#seal-shape" fill="none" stroke="#5f8f44" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" stroke-opacity="0.35" mask="url(#text-cutout-ancient)" />
    </g>
  </g>
</svg>
