<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="doc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="fold-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="-4" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="seal-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="md-grad" x1="0%" y1="0%" x2="0%" y2="100%">
       <stop offset="0%" stop-color="#3A414A"/>
       <stop offset="100%" stop-color="#181B20"/>
    </linearGradient>

    <linearGradient id="pdf-grad" x1="0%" y1="0%" x2="0%" y2="100%">
       <stop offset="0%" stop-color="#FF5252"/>
       <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>

    <linearGradient id="fold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
       <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
       <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3"/>
    </linearGradient>

    <clipPath id="doc-clip">
        <path d="M 90,60 L 310,60 L 420,170 L 420,450 C 420,470 404,486 384,486 L 126,486 C 106,486 90,470 90,450 Z" />
    </clipPath>

    <mask id="md-cutout">
        <rect x="-2" y="-1" width="34" height="22" rx="3" fill="white" />
        <path d="M 2,16 L 2,5 L 7,10 L 12,5 L 12,16 L 15,16 L 15,2 L 10,2 L 7,5 L 4,2 L -1,2 L -1,16 Z" fill="black" transform="translate(1, 0)" />
        <path d="M 21,2 L 21,10 L 18,10 L 23,16 L 28,10 L 25,10 L 25,2 Z" fill="black" transform="translate(1, 0)" />
    </mask>

    <filter id="rough-edges" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <path id="seal-shape" d="M 20,23 C 33,16 57,17 84,13 C 111,8 137,4 153,6 C 165,7 170,13 169,25 L 167,66 C 166,79 159,87 146,89 C 121,93 92,92 60,91 C 41,90 27,92 16,89 C 6,86 1,79 1,67 L 1,50 C 1,35 7,25 20,23 Z" />
    
    <filter id="stone-texture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="11" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feComponentTransfer in="mono" result="grain">
        <feFuncA type="table" tableValues="0 0.16" />
      </feComponentTransfer>
    </filter>
    
